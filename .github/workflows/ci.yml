name: ci
on:
  pull_request:
    branches:
      # Trigger on pull requests into main
      - main
    types: [ opened, synchronize ]

jobs:
  lint:
    name: Linting and Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Install clippy and fmt
        run: rustup component add clippy rustfmt
      - name: Run cargo clippy to pick up any errors
        run: cargo clippy --all-targets -- -Dwarnings
      - name: Check code is formatted
        run: cargo fmt -- --check

  debstatus:
    name: Debian version check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-debstatus
        run: cargo install cargo-debstatus
      - name: Run cargo debstatus
        run: cargo debstatus --json > /tmp/debstatus.json
      - name: Archive debstatus output
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: debstatus
          path: /tmp/debstatus.json
      - name: Show dependency status
        run: |
          jq -s 'map(select(.depth == 1)) | map({name, version, debian_version: .debian.version, exact_match: .debian.exact_match})' /tmp/debstatus.json

  build:
    name: Build package
    runs-on: ${{ matrix.build.os }}
    continue-on-error: ${{ matrix.build.experimental }}
    strategy:
      matrix:
        build:
          - os: ubuntu-22.04
            rust: stable
            target: x86_64-unknown-linux-gnu
            experimental: false
          - os: ubuntu-24.04
            rust: stable
            target: x86_64-unknown-linux-gnu
            experimental: false
          - os: ubuntu-24.04
            rust: nightly
            target: x86_64-unknown-linux-gnu
            experimental: true
          - os: ubuntu-24.04
            rust: stable
            target: x86_64-unknown-linux-musl
            experimental: false
          - os: ubuntu-24.04
            rust: beta
            target: x86_64-unknown-linux-gnu
            experimental: false
    steps:
      - uses: actions/checkout@v6
      - name: Install musl
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl
        if: ${{ matrix.build.target == 'x86_64-unknown-linux-musl' }}
      - name: Install rust
        uses: dtolnay/rust-toolchain@master
        with:
            toolchain: ${{ matrix.build.rust }}
            target: ${{ matrix.build.target }}
      - name: Install cargo-deb
        run: cargo install cargo-deb
      - name: Run tests
        run: cargo test --all-features --target ${{ matrix.build.target }}
      - name: Build binary
        run: cargo build --release --target ${{ matrix.build.target }}
      - name: Build package
        run: cargo deb --target ${{ matrix.build.target }}
      - name: Archive artifacts
        uses: actions/upload-artifact@v7
        if: ${{ matrix.build.rust == 'stable' }}
        with:
          name: stableartifacts-${{ matrix.build.os }}-${{ matrix.build.target }}
          path: |
            target/${{matrix.build.target}}/release/blob
            target/${{matrix.build.target}}/debian/*.deb

  integration-test:
    name: Integration Test (${{ matrix.auth }})
    runs-on: ubuntu-latest
    environment: integration-test
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        auth: [workload-identity, client-secret, developer-tools, storage-token]
    steps:
      - uses: actions/checkout@v6
      - name: Install rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      # Auth setup — each method configures env vars for the binary
      - name: Set client secret credentials
        if: matrix.auth == 'client-secret'
        run: |
          echo "AZURE_TENANT_ID=${{ secrets.ATB_TENANT_ID }}" >> $GITHUB_ENV
          echo "AZURE_CLIENT_ID=${{ secrets.ATB_CLIENT_ID }}" >> $GITHUB_ENV
          echo "AZURE_CLIENT_SECRET=${{ secrets.ATB_CLIENT_SECRET }}" >> $GITHUB_ENV

      - name: Azure Login
        if: matrix.auth == 'developer-tools' || matrix.auth == 'storage-token'
        uses: azure/login@v3
        with:
          creds: '{"clientId":"${{ secrets.ATB_CLIENT_ID }}","clientSecret":"${{ secrets.ATB_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ATB_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ATB_TENANT_ID }}"}'

      - name: Generate storage token
        if: matrix.auth == 'storage-token'
        run: |
          TOKEN=$(az account get-access-token --resource https://storage.azure.com --query accessToken -o tsv)
          echo "AZURE_STORAGE_BEARER_TOKEN=$TOKEN" >> $GITHUB_ENV

      # Common steps
      - name: Build binary
        run: cargo build --release
      - name: Install apt transport
        run: sudo cp target/release/blob /usr/lib/apt/methods/blob
      - name: Add blob apt source
        run: |
          echo 'deb [trusted=yes] blob://debianrepoatb.blob.core.windows.net/packages /' | sudo tee /etc/apt/sources.list.d/blob-test.list

      # Get the OIDC token if necessary - do this right before using it.
      - name: Get GitHub OIDC token
        if: matrix.auth == 'workload-identity'
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" \
            | jq -r '.value')
          echo "$TOKEN" > /tmp/github-oidc-token
          echo "AZURE_FEDERATED_TOKEN_FILE=/tmp/github-oidc-token" >> $GITHUB_ENV
          echo "AZURE_TENANT_ID=${{ secrets.ATB_TENANT_ID }}" >> $GITHUB_ENV
          echo "AZURE_CLIENT_ID=${{ secrets.ATB_CLIENT_ID }}" >> $GITHUB_ENV

      # Actually install the package.
      - name: apt update and install simpledeb
        run: |
          sudo -E apt-get update
          sudo -E apt-get install -y simpledeb
      - name: Upload transport log
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: log-${{ matrix.auth }}
          path: /var/log/apt-transport-blob.log
